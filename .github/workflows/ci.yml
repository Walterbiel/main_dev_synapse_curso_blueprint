name: CI - Validação Synapse

on:
  pull_request:
    branches: [main]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar padrão de nome da branch
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch de origem: $BRANCH"
          if [[ ! "$BRANCH" =~ ^feature/ ]]; then
            echo "❌ Branch '$BRANCH' não segue o padrão 'feature/*'"
            exit 1
          fi
          echo "✅ Nome de branch válido"

  validate-json:
    runs-on: ubuntu-latest
    needs: validate-branch-name
    steps:
      - uses: actions/checkout@v4

      - name: Validar sintaxe de todos os JSONs do Synapse
        run: |
          echo "Procurando arquivos JSON de recursos do Synapse..."
          find . -name "*.json" -not -path "./.git/*" -print0 | while IFS= read -r -d '' file; do
            echo "Validando: $file"
            python -m json.tool "$file" > /dev/null || exit 1
          done
          echo "✅ Todos os JSONs são válidos"
